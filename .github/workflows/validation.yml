name: Validation

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.travis*'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Compile & static checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compile
        run: mvn -B -ntp -fae compile test-compile

  tests:
    name: Tests (${{ matrix.profile }})
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        profile: [wildfly]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set vaadin proKey
        env:
          TB_LICENSE: ${{secrets.TB_LICENSE}}
        run: |
          mkdir -p ~/.vaadin/
          echo '{"username":"'`echo $TB_LICENSE | cut -d / -f1`'","proKey":"'`echo $TB_LICENSE | cut -d / -f2`'"}' > ~/.vaadin/proKey

      - name: Run tests (${{ matrix.profile }})
        run: mvn -B -ntp verify -P${{ matrix.profile }}
      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: surefire-reports-${{ matrix.profile }}
          path: vaadin-cdi/target/surefire-reports/
          if-no-files-found: ignore
